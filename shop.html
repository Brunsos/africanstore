<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop | CCIO Afri-Carib Home Mart | African & Caribbean Grocery Calgary</title>
<meta name="description" content="Shop authentic African and Caribbean groceries at CCIO Afri-Carib Home Mart Calgary. Browse spices, flours, meats, snacks and more.">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#6ec100;--green-dark:#3a7000;--green-light:#c8ff6a;
  --black:#0a0a0a;--white:#fff;
  --gray-50:#f8f8f6;--gray-100:#f0f0ec;--gray-200:#e0e0d8;--gray-600:#666;
  --text:#1a1a18;--text-muted:#666660;
}
html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;color:var(--text);background:var(--gray-50);overflow-x:hidden}
header{background:var(--black);border-bottom:3px solid var(--green);position:sticky;top:0;z-index:200}
.header-inner{max-width:1400px;margin:0 auto;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:68px;gap:16px}
.logo-wrap{display:flex;flex-direction:column;line-height:1;text-decoration:none}
.logo-ccio{font-family:'Oswald',sans-serif;font-size:10px;font-weight:600;color:#aaa;letter-spacing:.25em;text-transform:uppercase}
.logo-main{font-family:'Oswald',sans-serif;font-size:19px;font-weight:700;color:var(--green);letter-spacing:.02em;text-transform:uppercase}
.header-nav{display:flex;align-items:center;gap:4px}
.header-nav a{font-size:13px;font-weight:500;color:#ccc;text-decoration:none;padding:7px 13px;border-radius:6px;transition:.2s}
.header-nav a:hover{color:var(--green)}
.cart-btn{position:relative;background:var(--green);color:var(--black);border:none;border-radius:8px;padding:10px 18px;font-family:'Oswald',sans-serif;font-size:14px;font-weight:600;letter-spacing:.04em;cursor:pointer;display:flex;align-items:center;gap:8px;transition:.2s}
.cart-btn:hover{background:#7dd400}
.cart-count{background:var(--black);color:var(--green);border-radius:50%;width:20px;height:20px;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;min-width:20px}
.shop-wrap{max-width:1400px;margin:0 auto;padding:32px 24px;display:grid;grid-template-columns:260px 1fr;gap:28px;align-items:start}
.sidebar{background:var(--white);border-radius:14px;border:1px solid var(--gray-200);overflow:hidden;position:sticky;top:90px}
.sidebar-header{background:var(--black);padding:18px 20px}
.sidebar-header h2{font-family:'Oswald',sans-serif;font-size:16px;font-weight:600;color:var(--green);text-transform:uppercase;letter-spacing:.06em}
.sidebar-body{padding:20px}
.filter-group{margin-bottom:24px}
.filter-group:last-child{margin-bottom:0}
.filter-label{font-family:'Oswald',sans-serif;font-size:12px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--text-muted);margin-bottom:12px;display:block}
.category-btn{display:flex;align-items:center;justify-content:space-between;width:100%;background:none;border:1px solid var(--gray-200);border-radius:8px;padding:10px 14px;font-size:13px;font-weight:500;color:var(--text);cursor:pointer;margin-bottom:6px;transition:.2s;text-align:left}
.category-btn:hover,.category-btn.active{border-color:var(--green);background:rgba(110,193,0,.08);color:var(--green-dark)}
.category-btn .cat-count{font-size:11px;background:var(--gray-100);border-radius:12px;padding:2px 8px;color:var(--text-muted)}
.category-btn.active .cat-count{background:rgba(110,193,0,.2);color:var(--green-dark)}
.search-input{width:100%;padding:10px 14px;border:1px solid var(--gray-200);border-radius:8px;font-size:13px;font-family:'Inter',sans-serif;transition:.2s;outline:none}
.search-input:focus{border-color:var(--green)}
.clear-btn{background:none;border:none;color:var(--text-muted);font-size:12px;cursor:pointer;padding:4px 0;text-decoration:underline;margin-top:8px}
.clear-btn:hover{color:var(--green-dark)}
.shop-toolbar{background:var(--white);border:1px solid var(--gray-200);border-radius:12px;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;gap:12px;flex-wrap:wrap}
.results-count{font-size:14px;color:var(--text-muted)}
.results-count strong{color:var(--text);font-weight:600}
.sort-select{padding:8px 14px;border:1px solid var(--gray-200);border-radius:8px;font-size:13px;font-family:'Inter',sans-serif;background:var(--white);cursor:pointer;outline:none}
.sort-select:focus{border-color:var(--green)}
.product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:18px}
.product-card{background:var(--white);border:1px solid var(--gray-200);border-radius:14px;overflow:hidden;transition:.25s;display:flex;flex-direction:column}
.product-card:hover{border-color:var(--green);box-shadow:0 8px 28px rgba(110,193,0,.12);transform:translateY(-3px)}
.product-img-wrap{width:100%;aspect-ratio:1;overflow:hidden;background:var(--gray-100);border-bottom:1px solid var(--gray-100);position:relative;flex-shrink:0}
.product-img-wrap img{width:100%;height:100%;object-fit:cover;transition:transform .3s}
.product-card:hover .product-img-wrap img{transform:scale(1.06)}
.product-img-wrap .img-fallback{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:52px;background:linear-gradient(135deg,var(--gray-100),var(--gray-50))}
.product-body{padding:14px 16px;display:flex;flex-direction:column;flex:1}
.product-cat{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--green-dark);margin-bottom:5px}
.product-name{font-family:'Oswald',sans-serif;font-size:16px;font-weight:600;color:var(--text);margin-bottom:4px;line-height:1.3;flex:1}
.product-price{font-size:17px;font-weight:700;color:var(--text);margin:10px 0 14px}
.product-price span{font-size:12px;color:var(--text-muted);font-weight:400}
.add-btn{background:var(--green);color:var(--black);border:none;border-radius:8px;padding:11px;font-family:'Oswald',sans-serif;font-size:13px;font-weight:600;letter-spacing:.04em;cursor:pointer;width:100%;transition:.2s;text-transform:uppercase}
.add-btn:hover{background:#7dd400}
.qty-control{display:flex;align-items:center;border:1px solid var(--gray-200);border-radius:8px;overflow:hidden}
.qty-btn{background:var(--gray-100);border:none;width:38px;height:38px;font-size:18px;cursor:pointer;font-weight:600;transition:.2s;flex-shrink:0}
.qty-btn:hover{background:var(--green);color:var(--black)}
.qty-num{flex:1;text-align:center;font-size:14px;font-weight:600;padding:8px 4px;background:var(--white)}
.badge{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:3px 8px;border-radius:20px;margin-bottom:8px}
.badge-new{background:rgba(110,193,0,.15);color:var(--green-dark)}
.badge-sale{background:rgba(220,50,30,.12);color:#c0280a}
.cart-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;opacity:0;pointer-events:none;transition:.3s}
.cart-overlay.open{opacity:1;pointer-events:all}
.cart-drawer{position:fixed;right:0;top:0;bottom:0;width:420px;background:var(--white);z-index:301;transform:translateX(100%);transition:.3s;display:flex;flex-direction:column;box-shadow:-8px 0 40px rgba(0,0,0,.2)}
.cart-drawer.open{transform:translateX(0)}
.cart-head{background:var(--black);padding:20px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:3px solid var(--green)}
.cart-head h2{font-family:'Oswald',sans-serif;font-size:18px;font-weight:700;color:var(--white);text-transform:uppercase;letter-spacing:.04em}
.cart-close{background:none;border:1px solid #444;color:var(--white);width:34px;height:34px;border-radius:6px;cursor:pointer;font-size:16px}
.cart-close:hover{border-color:var(--green);color:var(--green)}
.cart-items{flex:1;overflow-y:auto;padding:16px}
.cart-empty{text-align:center;padding:60px 20px;color:var(--text-muted)}
.cart-empty .empty-icon{font-size:56px;margin-bottom:16px}
.cart-item{display:flex;gap:14px;padding:14px 0;border-bottom:1px solid var(--gray-100);align-items:flex-start}
.cart-item-img{width:64px;height:64px;border-radius:8px;object-fit:cover;background:var(--gray-100);flex-shrink:0;border:1px solid var(--gray-200);overflow:hidden}
.cart-item-img img{width:100%;height:100%;object-fit:cover}
.cart-item-img .ci-fallback{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:26px}
.cart-item-info{flex:1;min-width:0}
.cart-item-name{font-family:'Oswald',sans-serif;font-size:15px;font-weight:600;color:var(--text);margin-bottom:4px;line-height:1.2}
.cart-item-cat{font-size:11px;color:var(--text-muted);margin-bottom:8px}
.cart-item-row{display:flex;align-items:center;justify-content:space-between;gap:8px}
.cart-item-price{font-size:15px;font-weight:700;color:var(--text)}
.cart-item-qty{display:flex;align-items:center;border:1px solid var(--gray-200);border-radius:6px;overflow:hidden}
.cqty-btn{background:var(--gray-100);border:none;width:28px;height:28px;font-size:14px;cursor:pointer;font-weight:600;transition:.2s}
.cqty-btn:hover{background:var(--green);color:var(--black)}
.cqty-num{width:32px;text-align:center;font-size:13px;font-weight:600;padding:4px}
.remove-btn{background:none;border:none;color:var(--gray-600);cursor:pointer;font-size:16px;padding:2px;transition:.2s;flex-shrink:0}
.remove-btn:hover{color:#c0280a}
.cart-foot{padding:20px 24px;border-top:1px solid var(--gray-200);background:var(--gray-50)}
.cart-subtotal{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.cart-subtotal span{font-size:14px;color:var(--text-muted)}
.cart-subtotal strong{font-size:20px;font-weight:700;color:var(--text)}
.cart-note{font-size:12px;color:var(--text-muted);margin-bottom:16px;line-height:1.5;background:rgba(110,193,0,.08);border-radius:8px;padding:10px 12px;border-left:3px solid var(--green)}
.checkout-btn{background:var(--green);color:var(--black);border:none;border-radius:10px;padding:16px;font-family:'Oswald',sans-serif;font-size:16px;font-weight:700;letter-spacing:.06em;cursor:pointer;width:100%;text-transform:uppercase;transition:.2s;margin-bottom:8px}
.checkout-btn:hover{background:#7dd400}
.continue-btn{background:none;border:1px solid var(--gray-200);border-radius:10px;padding:12px;font-family:'Inter',sans-serif;font-size:13px;font-weight:500;cursor:pointer;width:100%;transition:.2s;color:var(--text)}
.continue-btn:hover{border-color:var(--green);color:var(--green-dark)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--black);color:var(--white);padding:12px 24px;border-radius:10px;font-size:14px;font-weight:500;z-index:400;transition:.3s;border-left:4px solid var(--green);white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,.3)}
.toast.show{transform:translateX(-50%) translateY(0)}
.pagination{display:flex;justify-content:center;gap:8px;margin-top:32px}
.page-btn{background:var(--white);border:1px solid var(--gray-200);border-radius:8px;width:40px;height:40px;font-size:14px;font-weight:500;cursor:pointer;transition:.2s;display:flex;align-items:center;justify-content:center}
.page-btn:hover,.page-btn.active{background:var(--green);border-color:var(--green);color:var(--black);font-weight:700}
.no-results{text-align:center;padding:80px 20px;color:var(--text-muted);grid-column:1/-1}
@media(max-width:900px){.shop-wrap{grid-template-columns:1fr}.sidebar{position:static}.cart-drawer{width:100%;max-width:420px}}
@media(max-width:560px){.product-grid{grid-template-columns:repeat(2,1fr)}.header-nav{display:none}}
</style>
</head>
<body>

<div class="toast" id="toast"></div>
<div class="cart-overlay" id="cartOverlay" onclick="closeCart()"></div>
<div class="cart-drawer" id="cartDrawer">
  <div class="cart-head">
    <h2>🛒 Your Cart</h2>
    <button class="cart-close" onclick="closeCart()">✕</button>
  </div>
  <div class="cart-items" id="cartItems"></div>
  <div class="cart-foot" id="cartFoot" style="display:none">
    <div class="cart-subtotal">
      <span>Subtotal</span>
      <strong id="cartTotal">$0.00</strong>
    </div>
    <div class="cart-note">📞 This is a demo store. To place a real order call us at <strong>(587) 707-1973</strong> or visit 40 Belmont Drive SW, Unit 630, Calgary AB.</div>
    <button class="checkout-btn" onclick="showToast('📞 Please call (587) 707-1973 to place your order!')">Call to Order</button>
    <button class="continue-btn" onclick="closeCart()">Continue Shopping</button>
  </div>
</div>

<header>
  <div class="header-inner">
    <a href="index.html" class="logo-wrap">
      <span class="logo-ccio">CCIO</span>
      <span class="logo-main">Afri-Carib Home Mart</span>
    </a>
    <nav class="header-nav">
      <a href="index.html">Home</a>
      <a href="index.html#about">About</a>
      <a href="index.html#contact">Contact</a>
    </nav>
    <button class="cart-btn" onclick="openCart()">

    </button>
  </div>
</header>

<div class="shop-wrap">
  <aside class="sidebar">
    <div class="sidebar-header"><h2>🔍 Filter Products</h2></div>
    <div class="sidebar-body">
      <div class="filter-group">
        <span class="filter-label">Search</span>
        <input type="text" class="search-input" id="searchInput" placeholder="Search products..." oninput="applyFilters()">
      </div>
      <div class="filter-group">
        <span class="filter-label">Category</span>
        <div id="categoryFilters"></div>
      </div>
      <div class="filter-group">
        <span class="filter-label">Max Price</span>
        <input type="range" id="priceRange" min="0" max="100" value="100" style="width:100%;accent-color:var(--green)" oninput="document.getElementById('priceVal').textContent='$'+this.value;applyFilters()">
        <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text-muted);margin-top:4px"><span>$0</span><span id="priceVal">$100</span></div>
      </div>
      <button class="clear-btn" onclick="clearFilters()">Clear all filters</button>
    </div>
  </aside>

  <div class="main-content">
    <div class="shop-toolbar">
      <p class="results-count">Showing <strong id="resultCount">0</strong> products</p>
      <select class="sort-select" id="sortSelect" onchange="applyFilters()">
        <option value="default">Default sorting</option>
        <option value="price-asc">Price: Low to High</option>
        <option value="price-desc">Price: High to Low</option>
        <option value="name-asc">Name: A–Z</option>
      </select>
    </div>
    <div class="product-grid" id="productGrid"></div>
    <div class="pagination" id="pagination"></div>
  </div>
</div>

  // PANTRY
  {id:39, name:"Tomato Paste (400g)",          cat:"Pantry",          price:3.49,  img:BASE+'2025/04/tomato-paste.jpg',                        badge:"",  emoji:"🍅"},
  {id:40, name:"Maggi Cubes (100pcs)",         cat:"Pantry",          price:5.99,  img:BASE+'2025/04/maggi.jpg',                               badge:"",  emoji:"🧂"},
  {id:41, name:"Scotch Bonnet Pepper (jar)",   cat:"Pantry",          price:7.99,  img:BASE+'2025/04/scotch-bonnet.jpg',                       badge:"",  emoji:"🌶️"},
  {id:42, name:"Coconut Oil (500ml)",          cat:"Pantry",          price:11.99, img:BASE+'2025/04/coconut-oil.jpg',                         badge:"",  emoji:"🥥"},
  {id:43, name:"Ackee (canned 540ml)",         cat:"Pantry",          price:9.99,  img:BASE+'2025/04/ackee.jpg',                               badge:"",  emoji:"🥫"},
  {id:44, name:"Jerk Seasoning (300g)",        cat:"Pantry",          price:8.49,  img:BASE+'2025/04/jerk-seasoning.jpg',                      badge:"new",emoji:"🌶️"},
];

const CATS = [...new Set(PRODUCTS.map(p=>p.cat))];
let cart={}, activeCategory="All", currentPage=1;
const PER_PAGE=12;

function imgTag(p, cls=''){
  return `<img src="${p.img}" alt="${p.name}" class="${cls}" loading="lazy"
    onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
    <div class="img-fallback" style="display:none">${p.emoji||'🛒'}</div>`;
}

function buildFilters(){
  const wrap=document.getElementById('categoryFilters');
  const counts={};
  PRODUCTS.forEach(p=>{counts[p.cat]=(counts[p.cat]||0)+1;});
  let html=`<button class="category-btn active" data-cat="All" onclick="setCategory('All',this)">All Products <span class="cat-count">${PRODUCTS.length}</span></button>`;
  CATS.forEach(c=>{
    html+=`<button class="category-btn" data-cat="${c}" onclick="setCategory('${c}',this)">${c} <span class="cat-count">${counts[c]}</span></button>`;
  });
  wrap.innerHTML=html;
}

function setCategory(cat,btn){
  activeCategory=cat;
  document.querySelectorAll('.category-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  currentPage=1;
  applyFilters();
}

function clearFilters(){
  activeCategory="All";
  document.getElementById('searchInput').value='';
  document.getElementById('priceRange').value=100;
  document.getElementById('priceVal').textContent='$100';
  document.getElementById('sortSelect').value='default';
  document.querySelectorAll('.category-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector('[data-cat="All"]').classList.add('active');
  currentPage=1;
  applyFilters();
}

function applyFilters(){
  const search=document.getElementById('searchInput').value.toLowerCase();
  const maxPrice=parseFloat(document.getElementById('priceRange').value);
  const sort=document.getElementById('sortSelect').value;
  let filtered=PRODUCTS.filter(p=>{
    const matchCat=activeCategory==="All"||p.cat===activeCategory;
    const matchSearch=p.name.toLowerCase().includes(search)||p.cat.toLowerCase().includes(search);
    const matchPrice=p.price<=maxPrice;
    return matchCat&&matchSearch&&matchPrice;
  });
  if(sort==='price-asc') filtered.sort((a,b)=>a.price-b.price);
  else if(sort==='price-desc') filtered.sort((a,b)=>b.price-a.price);
  else if(sort==='name-asc') filtered.sort((a,b)=>a.name.localeCompare(b.name));
  renderProducts(filtered);
}

function renderProducts(products){
  const grid=document.getElementById('productGrid');
  document.getElementById('resultCount').textContent=products.length;
  const start=(currentPage-1)*PER_PAGE;
  const page=products.slice(start,start+PER_PAGE);
  if(!page.length){
    grid.innerHTML=`<div class="no-results"><div style="font-size:64px;margin-bottom:16px">🔍</div><p>No products found.<br>Try a different search or category.</p></div>`;
    document.getElementById('pagination').innerHTML='';
    return;
  }
  grid.innerHTML=page.map(p=>{
    const inCart=cart[p.id]&&cart[p.id].qty>0;
    const badgeHTML=p.badge==='new'?'<span class="badge badge-new">New</span>':p.badge==='sale'?'<span class="badge badge-sale">Sale</span>':'';
    return `<div class="product-card" id="card-${p.id}">
      <div class="product-img-wrap">${imgTag(p)}</div>
      <div class="product-body">
        ${badgeHTML}
        <div class="product-cat">${p.cat}</div>
        <div class="product-name">${p.name}</div>
        <div class="product-price">$${p.price.toFixed(2)} <span>CAD</span></div>
        ${inCart
          ?`<div class="qty-control">
              <button class="qty-btn" onclick="changeQty(${p.id},-1)">−</button>
              <div class="qty-num" id="qty-${p.id}">${cart[p.id].qty}</div>
              <button class="qty-btn" onclick="changeQty(${p.id},1)">+</button>
            </div>`
          :`<button class="add-btn" onclick="addToCart(${p.id})">+ Add to Cart</button>`
        }
      </div>
    </div>`;
  }).join('');
  const pages=Math.ceil(products.length/PER_PAGE);
  let pag='';
  for(let i=1;i<=pages;i++) pag+=`<button class="page-btn${i===currentPage?' active':''}" onclick="goPage(${i})">${i}</button>`;
  document.getElementById('pagination').innerHTML=pag;
}

function goPage(p){currentPage=p;applyFilters();window.scrollTo({top:0,behavior:'smooth'});}

function addToCart(id){
  const p=PRODUCTS.find(x=>x.id===id);
  if(!cart[id]) cart[id]={...p,qty:0};
  cart[id].qty++;
  updateCartUI();
  showToast(`✅ ${p.name} added to cart!`);
  applyFilters();
}

function changeQty(id,delta){
  if(!cart[id]) return;
  cart[id].qty+=delta;
  if(cart[id].qty<=0) delete cart[id];
  updateCartUI();
  applyFilters();
}

function removeFromCart(id){
  delete cart[id];
  updateCartUI();
  renderCartDrawer();
  applyFilters();
}

function updateCartUI(){
  const total=Object.values(cart).reduce((s,i)=>s+i.qty,0);
  document.getElementById('cartCount').textContent=total;
  renderCartDrawer();
}

function renderCartDrawer(){
  const items=Object.values(cart);
  const el=document.getElementById('cartItems');
  const foot=document.getElementById('cartFoot');
  if(!items.length){
    el.innerHTML=`<div class="cart-empty"><div class="empty-icon">🛒</div><p>Your cart is empty.<br>Add some products!</p></div>`;
    foot.style.display='none';
    return;
  }
  foot.style.display='block';
  el.innerHTML=items.map(item=>`
    <div class="cart-item">
      <div class="cart-item-img">
        <img src="${item.img}" alt="${item.name}" style="width:100%;height:100%;object-fit:cover"
          onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
        <div class="ci-fallback" style="display:none">${item.emoji||'🛒'}</div>
      </div>
      <div class="cart-item-info">
        <div class="cart-item-name">${item.name}</div>
        <div class="cart-item-cat">${item.cat}</div>
        <div class="cart-item-row">
          <div class="cart-item-qty">
            <button class="cqty-btn" onclick="changeQtyCart(${item.id},-1)">−</button>
            <div class="cqty-num">${item.qty}</div>
            <button class="cqty-btn" onclick="changeQtyCart(${item.id},1)">+</button>
          </div>
          <div class="cart-item-price">$${(item.price*item.qty).toFixed(2)}</div>
          <button class="remove-btn" onclick="removeFromCart(${item.id})">🗑</button>
        </div>
      </div>
    </div>`).join('');
  const subtotal=items.reduce((s,i)=>s+(i.price*i.qty),0);
  document.getElementById('cartTotal').textContent='$'+subtotal.toFixed(2);
}

function changeQtyCart(id,delta){
  if(!cart[id]) return;
  cart[id].qty+=delta;
  if(cart[id].qty<=0) delete cart[id];
  updateCartUI();
  applyFilters();
}

function openCart(){document.getElementById('cartDrawer').classList.add('open');document.getElementById('cartOverlay').classList.add('open');}
function closeCart(){document.getElementById('cartDrawer').classList.remove('open');document.getElementById('cartOverlay').classList.remove('open');}

let toastTimer;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),2800);
}

buildFilters();
applyFilters();
renderCartDrawer();
</script>
</body>
</html>
